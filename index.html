<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #message {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #4a90e2, 0 0 15px #4a90e2, 0 0 25px #4a90e2;
            opacity: 0; 
            transition: opacity 1s ease-in-out;
            white-space: pre-wrap;
            text-align: center;
        }

        .heart-box {
            position: relative;
            width: 320px;
            height: 320px;
            display: none; 
            justify-content: center;
            align-items: center;
            animation: zoomInHeart 1.2s ease-out forwards;
        }

        .heart-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(74, 144, 226, 0.05); 
            stroke: #4a90e2;
            stroke-width: 1.5;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: drawHeart 3s ease-in-out forwards;
            filter: drop-shadow(0 0 10px #4a90e2) drop-shadow(0 0 20px #4a90e2);
        }

        .heart-text {
            position: absolute;
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: bold;
            width: 70%;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 5px #4a90e2, 0 0 15px #4a90e2;
            opacity: 0;
            animation: fadeInText 1.5s ease-in-out 1.5s forwards; 
        }

        @keyframes zoomInHeart {
            from { opacity: 0; transform: scale(0.3); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes drawHeart { to { stroke-dashoffset: 0; } }
        @keyframes fadeInText { to { opacity: 1; } }

        /* --------------------------------------------------
           MÀN HÌNH BẮT BUỘC XOAY NGANG (CHỈ DÀNH CHO DI ĐỘNG)
        -------------------------------------------------- */
        #rotate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999; /* Luôn nằm trên cùng */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            font-family: sans-serif;
            transition: opacity 0.5s ease;
        }

        /* Icon điện thoại xoay chân thực */
        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid #fff;
            border-radius: 8px;
            position: relative;
            margin-bottom: 20px;
            animation: rotatePhone 2s ease-in-out infinite;
        }
        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #fff;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #rotate-overlay p {
            font-size: 18px;
            margin: 0 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div class="phone-icon"></div>
        <p>Vui lòng xoay ngang thiết bị của bạn</p>
    </div>

    <canvas id="matrix"></canvas>

    <div id="message-container">
        <div id="message"></div>
        
        <div class="heart-box" id="heartBox">
            <svg class="heart-shape" viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
            <div class="heart-text">Cảm ơn vì khoảng thời gian tươi đẹp vừa qua! 💕</div>
        </div>
    </div>

    <script>
        // --------------------------------------------------
        // LOGIC KIỂM TRA HƯỚNG MÀN HÌNH
        // --------------------------------------------------
        const overlay = document.getElementById('rotate-overlay');
        let isScriptStarted = false; // Đảm bảo kịch bản chỉ chạy 1 lần duy nhất khi xoay ngang

        function checkOrientation() {
            // Nếu chiều rộng lớn hơn chiều cao -> Đang nằm ngang
            if (window.innerWidth > window.innerHeight) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);

                // Kích hoạt chạy hiệu ứng chữ (nếu chưa chạy)
                if (!isScriptStarted) {
                    isScriptStarted = true;
                    setTimeout(playScript, 1000); 
                }
            } else {
                // Nếu người dùng cố tình xoay dọc lại, hiện lại màn hình chặn
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 10);
            }
        }

        // Lắng nghe sự kiện thay đổi kích thước/xoay màn hình
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            checkOrientation();
        });

        // Kiểm tra ngay khi vừa tải trang
        window.addEventListener('load', checkOrientation);

        // --------------------------------------------------
        // MƯA MA TRẬN 
        // --------------------------------------------------
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#64a1f4'; 
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --------------------------------------------------
        // KỊCH BẢN CHẠY CHỮ
        // --------------------------------------------------
        const script = [
            "3",
            "2",
            "1",
            "Anhhh ơiiii",
            "Anh có đồng ý",
            "Làm người yêu em hong?",
            "Em iu Anhhh 💙"
        ];

        let currentIndex = 0;
        const messageEl = document.getElementById('message');
        const heartBoxEl = document.getElementById('heartBox');

        function playScript() {
            if (currentIndex >= script.length) {
                setTimeout(() => {
                    messageEl.style.opacity = 0;
                    setTimeout(() => {
                        messageEl.style.display = 'none';
                        heartBoxEl.style.display = 'flex';
                    }, 1000);
                }, 2000);
                return;
            }

            messageEl.style.opacity = 0;

            setTimeout(() => {
                messageEl.innerHTML = script[currentIndex];
                messageEl.style.opacity = 1;
                currentIndex++;
                setTimeout(playScript, 2500);
            }, 1000);
        }
    </script>
</body>
</html>
